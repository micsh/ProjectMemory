name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Test
        run: dotnet test --verbosity minimal

      - name: Publish
        run: dotnet publish src/ProjectMemory.Server/ProjectMemory.Server.fsproj -c Release -r ${{ matrix.rid }} -o publish/${{ matrix.rid }}

      - name: Archive (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath ProjectMemory-${{ matrix.rid }}.zip

      - name: Archive (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: tar -czf ProjectMemory-${{ matrix.rid }}.tar.gz -C publish/${{ matrix.rid }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectMemory-${{ matrix.rid }}
          path: ProjectMemory-${{ matrix.rid }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
